<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mapa de Beneficiarios — Mejoramiento de Viviendas</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg-primary:#f8fafc;--bg-secondary:#ffffff;--bg-tertiary:#e2e8f0;
    --text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
    --border:#e2e8f0;--accent:#2563eb;--radius:10px;
  }
  body{background:var(--bg-primary);color:var(--text-primary);
       font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
       height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  /* ── HEADER ── */
  .header{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 100%);
          border-bottom:1px solid var(--border);padding:12px 24px;
          display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:600;}
  .header-left{display:flex;align-items:center;gap:16px;}
  .logo{font-size:17px;font-weight:800;letter-spacing:-.3px;color:#fff;}
  .logo span{color:#93c5fd;}
  .logo small{font-size:11px;font-weight:400;color:rgba(255,255,255,.7);display:block;margin-top:1px;}
  .header-stats{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;
        padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;
        display:flex;align-items:center;gap:5px;white-space:nowrap;}
  .chip b{font-size:14px;}
  .header-right{display:flex;gap:8px;align-items:center;}
  .btn{padding:6px 14px;border:none;border-radius:6px;font-size:11px;font-weight:700;
       cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;}
  .btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);}
  .btn-ghost:hover{background:rgba(255,255,255,.25);}

  /* ── TOOLBAR ── */
  .toolbar{background:#fff;border-bottom:1px solid var(--border);
           padding:8px 24px;display:flex;gap:8px;align-items:center;flex-shrink:0;
           flex-wrap:wrap;z-index:500;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .toolbar select,.toolbar input{background:#fff;color:var(--text-primary);
    border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;outline:none;}
  .toolbar select:focus,.toolbar input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.15);}
  .toolbar input{min-width:200px;flex:1;max-width:320px;}
  .estado-legend{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-secondary);
               cursor:pointer;padding:2px 8px;border-radius:12px;border:1px solid transparent;transition:all .15s;}
  .legend-item:hover{border-color:var(--border);background:var(--bg-primary);}
  .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

  /* ── MAIN ── */
  .main{display:flex;flex:1;overflow:hidden;position:relative;}
  #map{flex:1;z-index:0;}

  /* ── SIDE PANEL ── */
  .side-panel{width:0;overflow:hidden;background:#fff;border-left:1px solid var(--border);
              transition:width .3s cubic-bezier(.4,0,.2,1);flex-shrink:0;display:flex;flex-direction:column;}
  .side-panel.open{width:400px;}
  @media(max-width:768px){.side-panel.open{width:100%;position:absolute;right:0;top:0;bottom:0;z-index:800;}}
  .sp-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;
             align-items:flex-start;justify-content:space-between;flex-shrink:0;background:var(--bg-primary);}
  .sp-title{font-size:14px;font-weight:700;}
  .sp-subtitle{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .sp-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;}
  .sp-close:hover{color:var(--text-primary);}
  .sp-body{flex:1;overflow-y:auto;padding:16px 20px;}
  .sp-section{margin-bottom:20px;}
  .sp-section-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;
                    letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .sp-field{background:var(--bg-primary);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
  .sp-field.full{grid-column:span 2;}
  .sp-field label{font-size:9px;font-weight:700;color:var(--text-muted);text-transform:uppercase;
                  letter-spacing:.8px;display:block;margin-bottom:3px;}
  .sp-field span{font-size:13px;color:var(--text-primary);font-weight:500;}
  .sp-field span.empty{color:var(--text-muted);font-style:italic;font-weight:400;font-size:11px;}
  .estado-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;
              font-size:12px;font-weight:700;letter-spacing:.3px;}
  .diagnostico-tag{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;}
  .diag-viable{background:#dcfce7;color:#16a34a;border:1px solid #86efac;}
  .diag-inviable{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;}
  .service-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;
                 font-size:11px;font-weight:600;margin-right:4px;margin-bottom:4px;}
  .svc-yes{background:#dcfce7;color:#16a34a;border:1px solid #86efac;}
  .svc-no{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;}

  /* ── ROUTE INFO ── */
  .route-card{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #93c5fd;
              border-radius:10px;padding:14px;margin-bottom:16px;}
  .route-card h4{font-size:11px;font-weight:700;color:#1e40af;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
  .route-stats{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
  .route-stat{text-align:center;}
  .route-stat .val{font-size:20px;font-weight:800;color:#1e40af;}
  .route-stat .lbl{font-size:9px;color:#3b82f6;text-transform:uppercase;font-weight:700;}
  .route-roads{margin-top:8px;}
  .road-chip{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;
             margin:2px;background:#fff;border:1px solid #bfdbfe;color:#1e40af;}
  .route-loading{color:#3b82f6;font-size:12px;display:flex;align-items:center;gap:6px;}
  .route-btn{display:block;width:100%;padding:10px;background:#2563eb;color:#fff;border:none;
             border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;margin-top:8px;}
  .route-btn:hover{background:#1d4ed8;}
  .route-btn.active{background:#dc2626;}

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper{background:#fff;color:var(--text-primary);
    border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);}
  .leaflet-popup-tip{background:#fff;}
  .leaflet-popup-content{margin:12px 16px;font-size:12px;line-height:1.5;}
  .popup-name{font-size:14px;font-weight:700;margin-bottom:4px;color:#0f172a;}
  .popup-loc{color:var(--text-muted);font-size:11px;margin-bottom:8px;}
  .popup-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;}
  .popup-row span:first-child{color:var(--text-muted);}
  .popup-btn{display:block;width:100%;margin-top:10px;padding:8px;background:var(--accent);
             color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;}
  .popup-btn:hover{background:#1d4ed8;}

  /* ── LOADING ── */
  .loading-overlay{position:fixed;inset:0;background:#fff;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s;}
  .loading-overlay.hidden{opacity:0;pointer-events:none;}
  .loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);
          border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:var(--text-muted);}

  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:var(--bg-primary);}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loader"></div>
  <div class="loading-text">Cargando beneficiarios desde Google Sheets...</div>
</div>

<div class="header">
  <div class="header-left">
    <div class="logo">
      Viviendas <span>Antioquia</span>
      <small>Mapa de Beneficiarios — Mejoramiento de Viviendas</small>
    </div>
  </div>
  <div class="header-stats">
    <div class="chip">Total: <b id="st-total">—</b></div>
    <div class="chip" style="color:#86efac;">Viables: <b id="st-viables">—</b></div>
    <div class="chip" style="color:#fca5a5;">Inviables: <b id="st-inviables">—</b></div>
    <div class="chip" style="color:#fde68a;">Municipios: <b id="st-municipios">—</b></div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost" onclick="openAdminModal()">&#x2699; Columnas</button>
    <button class="btn btn-ghost" onclick="reloadData()">&#x21BB; Actualizar</button>
  </div>
</div>

<div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;width:520px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 50px rgba(0,0,0,.3);">
    <div style="padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-weight:700;font-size:15px;">Configurar columnas del panel</div>
        <div style="font-size:11px;color:#64748b;margin-top:2px;">Marca las columnas que quieres mostrar en la vista de detalle</div>
      </div>
      <button onclick="closeAdminModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#64748b;">&#x2715;</button>
    </div>
    <div style="padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;gap:8px;">
      <button onclick="toggleAllColumns(true)" style="padding:6px 12px;border:1px solid #2563eb;background:#fff;color:#2563eb;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;">Seleccionar todo</button>
      <button onclick="toggleAllColumns(false)" style="padding:6px 12px;border:1px solid #cbd5e1;background:#fff;color:#475569;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;">Limpiar</button>
    </div>
    <div id="admin-cols-list" style="flex:1;overflow-y:auto;padding:14px 20px;"></div>
    <div style="padding:14px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px;">
      <button onclick="closeAdminModal()" style="padding:8px 16px;background:#f1f5f9;border:1px solid #cbd5e1;color:#475569;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;">Cancelar</button>
      <button onclick="saveAdminConfig()" style="padding:8px 18px;background:#2563eb;border:none;color:#fff;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;">Guardar</button>
    </div>
  </div>
</div>

<div class="toolbar">
  <select id="sel-proyecto" onchange="applyFilters()"><option value="">Todos los proyectos</option></select>
  <select id="sel-municipio" onchange="applyFilters()"><option value="">Todos los municipios</option></select>
  <select id="sel-estado" onchange="applyFilters()"><option value="">Todos los estados</option></select>
  <select id="sel-diagnostico" onchange="applyFilters()">
    <option value="">Diagnóstico</option><option value="VIABLE">Viable</option><option value="INVIABLE">Inviable</option>
  </select>
  <input id="search-input" type="text" placeholder="Buscar beneficiario, vereda, ID..." oninput="applyFilters()">
  <div style="display:flex;align-items:center;gap:4px;background:#eff6ff;border:1px solid #93c5fd;border-radius:6px;padding:3px 8px;">
    <span style="font-size:10px;font-weight:700;color:#1e40af;text-transform:uppercase;">Visita:</span>
    <input id="date-from" type="date" onchange="applyFilters()" title="Desde" style="border:none;background:transparent;font-size:11px;padding:2px;outline:none;">
    <span style="color:#94a3b8;">→</span>
    <input id="date-to" type="date" onchange="applyFilters()" title="Hasta" style="border:none;background:transparent;font-size:11px;padding:2px;outline:none;">
    <button onclick="clearDateFilter()" title="Limpiar fechas" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:14px;padding:0 4px;">&#x2715;</button>
  </div>
  <div class="estado-legend" id="estado-legend"></div>
</div>

<div class="main">
  <div id="map"></div>
  <div class="side-panel" id="side-panel">
    <div class="sp-header">
      <div><div class="sp-title" id="sp-title">—</div><div class="sp-subtitle" id="sp-subtitle">—</div></div>
      <button class="sp-close" onclick="closePanel()">&#x2715;</button>
    </div>
    <div class="sp-body" id="sp-body"></div>
  </div>
</div>

<script>
var SHEET_ID = "1XO5fl4hqh7iREDY6cTLpZoLkqJBUhk5-6nWWEpkOE08";
var SHEET_NAME = "01_Beneficiario";
var SHEET_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
                "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(SHEET_NAME);

// ── MUNICIPALITY CENTERS (casco urbano) ──
var MUNI_CENTERS = {
  "ANORI":    {lat: 7.0736, lng: -75.1461},
  "DABEIBA":  {lat: 7.0003, lng: -76.2561},
  "ITUANGO":  {lat: 7.1731, lng: -75.7642},
  "FRONTINO": {lat: 6.7753, lng: -76.1347},
  "URRAO":    {lat: 6.3156, lng: -76.1344},
  "ABRIAQUI": {lat: 6.6331, lng: -76.0706},
  "CAÑASGORDAS":{lat: 6.7481, lng: -76.0269},
  "GIRALDO":  {lat: 6.6314, lng: -75.9464},
  "BURITICA": {lat: 6.7136, lng: -75.9108},
  "PEQUE":    {lat: 7.0100, lng: -75.8864},
  "SABANALARGA":{lat:6.8528, lng:-75.8244},
  "LIBORINA": {lat: 6.6750, lng: -75.8064},
  "SANTA FE DE ANTIOQUIA":{lat:6.5561,lng:-75.8283},
  "AMALFI":   {lat: 6.9106, lng: -75.0778},
  "YOLOMBO":  {lat: 6.5975, lng: -75.0136},
  "VEGACHI":  {lat: 6.7739, lng: -74.8006},
  "REMEDIOS": {lat: 7.0286, lng: -74.6947},
  "SEGOVIA":  {lat: 7.0836, lng: -74.7003},
};

var ESTADO_CONFIG = {
  "VISITADO":      {color:"#3b82f6", icon:"&#x1F4CD;", bg:"#dbeafe", border:"#93c5fd", text:"#1e40af"},
  "APROBADO":      {color:"#16a34a", icon:"&#x2705;",  bg:"#dcfce7", border:"#86efac", text:"#166534"},
  "RECHAZADO":     {color:"#dc2626", icon:"&#x274C;",  bg:"#fee2e2", border:"#fca5a5", text:"#991b1b"},
  "EN EJECUCIÓN":  {color:"#d97706", icon:"&#x1F6A7;", bg:"#fef3c7", border:"#fcd34d", text:"#92400e"},
  "EN EJECUCION":  {color:"#d97706", icon:"&#x1F6A7;", bg:"#fef3c7", border:"#fcd34d", text:"#92400e"},
  "EN STAND BY":   {color:"#7c3aed", icon:"&#x23F8;",  bg:"#ede9fe", border:"#c4b5fd", text:"#5b21b6"},
  "EJECUTADO":     {color:"#0891b2", icon:"&#x2705;",  bg:"#cffafe", border:"#67e8f9", text:"#155e75"},
  "FACTURADO":     {color:"#059669", icon:"&#x1F4B0;", bg:"#d1fae5", border:"#6ee7b7", text:"#065f46"},
};
var DEFAULT_ESTADO = {color:"#64748b", icon:"&#x2B24;", bg:"#f1f5f9", border:"#cbd5e1", text:"#334155"};

var ALL_DATA = [], _filtered = [], _map, _markers = [];
var _routeLayer = null, _routeOriginMarker = null;
var _allRoutesLayer = null, _allOriginsLayer = null;
var _routeCache = {};
var PROYECTO_LABELS = {};

// ── CSV PARSER ──
function parseCSV(text) {
  var records = [], current = "", inQuotes = false, fields = [], headers = null;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQuotes) {
      if (c === '"') { if (i+1 < text.length && text[i+1] === '"') { current += '"'; i++; } else { inQuotes = false; } }
      else { current += (c === '\n' || c === '\r') ? ' ' : c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { fields.push(current.trim()); current = ""; }
      else if (c === '\n' || c === '\r') {
        if (c === '\r' && i+1 < text.length && text[i+1] === '\n') i++;
        fields.push(current.trim()); current = "";
        if (fields.length > 1 || fields[0] !== "") {
          if (!headers) headers = fields;
          else { var obj = {}; for (var j = 0; j < headers.length; j++) obj[headers[j]] = fields[j] || ""; records.push(obj); }
        }
        fields = [];
      } else current += c;
    }
  }
  if (current || fields.length) { fields.push(current.trim());
    if (headers && (fields.length > 1 || fields[0] !== "")) { var obj = {}; for (var j = 0; j < headers.length; j++) obj[headers[j]] = fields[j] || ""; records.push(obj); }
  }
  return records;
}

function parseDMS(coordStr) {
  if (!coordStr) return null;
  var s = coordStr.replace(/\s+/g, " ").trim();
  s = s.replace(/[‘’´`′]/g, "'");
  s = s.replace(/[“”″]/g, '"');
  var re = /(\d+)\s*[°]\s*(\d+)\s*[']\s*([\d.]+)\s*["]\s*([NS])\s+(\d+)\s*[°]\s*(\d+)\s*[']\s*([\d.]+)\s*["]\s*([EW])/i;
  var m = s.match(re);
  if (!m) return null;
  var latD = parseFloat(m[1]) + parseFloat(m[2])/60 + parseFloat(m[3])/3600;
  var lngD = parseFloat(m[5]) + parseFloat(m[6])/60 + parseFloat(m[7])/3600;
  if (m[4].toUpperCase() === "S") latD = -latD;
  if (m[8].toUpperCase() === "W") lngD = -lngD;
  return {lat: latD, lng: lngD};
}

function createMarkerIcon(estado) {
  var cfg = ESTADO_CONFIG[(estado || "").toUpperCase()] || DEFAULT_ESTADO;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="40" viewBox="0 0 30 40">' +
    '<defs><filter id="s" x="-20%" y="-10%" width="140%" height="130%">' +
    '<feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity=".25"/></filter></defs>' +
    '<path d="M15 0C6.72 0 0 6.72 0 15c0 11.25 15 25 15 25s15-13.75 15-25C30 6.72 23.28 0 15 0z" ' +
    'fill="' + cfg.color + '" filter="url(#s)"/>' +
    '<circle cx="15" cy="14" r="7" fill="#fff"/>' +
    '<circle cx="15" cy="14" r="4" fill="' + cfg.color + '"/>' +
    '</svg>';
  return L.divIcon({ className:"", html:svg, iconSize:[30,40], iconAnchor:[15,40], popupAnchor:[0,-40] });
}

function createOriginIcon() {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">' +
    '<circle cx="12" cy="12" r="10" fill="#1e40af" stroke="#fff" stroke-width="3"/>' +
    '<circle cx="12" cy="12" r="4" fill="#fff"/></svg>';
  return L.divIcon({ className:"", html:svg, iconSize:[24,24], iconAnchor:[12,12] });
}

// ── ROUTING (OSRM) ──
function fetchRoute(fromLat, fromLng, toLat, toLng, callback) {
  var url = "https://router.project-osrm.org/route/v1/driving/" +
    fromLng + "," + fromLat + ";" + toLng + "," + toLat +
    "?overview=full&geometries=geojson&steps=true";
  fetch(url).then(function(r){ return r.json(); }).then(function(data){
    if (data.code === "Ok" && data.routes && data.routes.length) callback(null, data.routes[0]);
    else callback("Sin ruta disponible");
  }).catch(function(e){ callback("Error de conexión: " + e.message); });
}

function clearRoute() {
  if (_routeLayer) { _map.removeLayer(_routeLayer); _routeLayer = null; }
  if (_routeOriginMarker) { _map.removeLayer(_routeOriginMarker); _routeOriginMarker = null; }
}

function clearAllRoutes() {
  if (_allRoutesLayer) { _map.removeLayer(_allRoutesLayer); _allRoutesLayer = null; }
  if (_allOriginsLayer) { _map.removeLayer(_allOriginsLayer); _allOriginsLayer = null; }
}

function drawAllRoutes(data) {
  clearAllRoutes();
  _allRoutesLayer = L.layerGroup().addTo(_map);
  _allOriginsLayer = L.layerGroup().addTo(_map);
  var originsAdded = {};
  var pending = 0, done = 0;

  data.forEach(function(d) {
    var coord = parseDMS(d.COORDENADAS);
    if (!coord) return;
    var muni = (d.MUNICIPIO || "").toUpperCase();
    var center = MUNI_CENTERS[muni];
    if (!center) return;

    if (!originsAdded[muni]) {
      L.marker([center.lat, center.lng], { icon: createOriginIcon() })
        .bindPopup('<div style="font-size:12px;font-weight:700;text-align:center;">Casco Urbano<br>' + d.MUNICIPIO + '</div>')
        .addTo(_allOriginsLayer);
      originsAdded[muni] = true;
    }

    var cacheKey = center.lat + "," + center.lng + "->" + coord.lat + "," + coord.lng;
    pending++;

    if (_routeCache[cacheKey]) {
      L.geoJSON(_routeCache[cacheKey].geometry, { style: { color: "#1e40af", weight: 5, opacity: 0.85 } }).addTo(_allRoutesLayer);
      done++;
      updateMarkerPopup(d, _routeCache[cacheKey]);
      return;
    }

    fetchRoute(center.lat, center.lng, coord.lat, coord.lng, function(err, route) {
      done++;
      if (err || !route) return;
      _routeCache[cacheKey] = { geometry: route.geometry, distance: route.distance, duration: route.duration, raw: route };
      if (_allRoutesLayer) {
        L.geoJSON(route.geometry, { style: { color: "#1e40af", weight: 5, opacity: 0.85 } }).addTo(_allRoutesLayer);
      }
      updateMarkerPopup(d, _routeCache[cacheKey]);
    });
  });
}

function showRoute(d) {
  var coord = parseDMS(d.COORDENADAS);
  if (!coord) return;
  var muni = (d.MUNICIPIO || "").toUpperCase();
  var center = MUNI_CENTERS[muni];
  if (!center) { updateRouteUI("No hay coordenadas del casco urbano para " + d.MUNICIPIO); return; }

  updateRouteUI("loading");
  clearRoute();

  var cacheKey = center.lat + "," + center.lng + "->" + coord.lat + "," + coord.lng;
  var cb = function(err, route) {
    if (err) { updateRouteUI(err); return; }
    if (!_routeCache[cacheKey]) _routeCache[cacheKey] = { geometry: route.geometry, distance: route.distance, duration: route.duration, raw: route };

    var geojson = route.geometry;
    _routeLayer = L.geoJSON(geojson, {
      style: { color: "#1e40af", weight: 6, opacity: 0.9 }
    }).addTo(_map);

    _routeOriginMarker = L.marker([center.lat, center.lng], { icon: createOriginIcon() }).addTo(_map);
    _routeOriginMarker.bindPopup('<div style="font-size:12px;font-weight:700;text-align:center;">Casco Urbano<br>' + d.MUNICIPIO + '</div>');

    var bounds = _routeLayer.getBounds();
    bounds.extend([coord.lat, coord.lng]);
    _map.fitBounds(bounds, { padding: [60, 60] });

    var distKm = (route.distance / 1000).toFixed(1);
    var durMin = Math.round(route.duration / 60);
    var durH = Math.floor(durMin / 60);
    var durM = durMin % 60;
    var durStr = durH > 0 ? durH + "h " + durM + "min" : durMin + " min";

    // Extract road types from steps
    var roadTypes = {};
    if (route.legs) {
      route.legs.forEach(function(leg) {
        (leg.steps || []).forEach(function(step) {
          var name = step.name || "Sin nombre";
          var ref = step.ref || "";
          var label = ref ? ref + (name !== "" && name !== ref ? " (" + name + ")" : "") : name;
          if (label && label !== "" && step.distance > 100) {
            var stepKm = (step.distance / 1000).toFixed(1);
            if (!roadTypes[label]) roadTypes[label] = { km: 0, maneuver: step.maneuver ? step.maneuver.type : "" };
            roadTypes[label].km += step.distance / 1000;
          }
        });
      });
    }

    var roadsHtml = "";
    var sortedRoads = Object.keys(roadTypes).sort(function(a,b){ return roadTypes[b].km - roadTypes[a].km; });
    sortedRoads.slice(0, 8).forEach(function(r) {
      roadsHtml += '<span class="road-chip">' + r + ' <small>(' + roadTypes[r].km.toFixed(1) + ' km)</small></span>';
    });

    var html = '<div class="route-card">' +
      '<h4>&#x1F6E3; Ruta desde casco urbano — ' + d.MUNICIPIO + '</h4>' +
      '<div class="route-stats">' +
        '<div class="route-stat"><div class="val">' + distKm + '</div><div class="lbl">Kilómetros</div></div>' +
        '<div class="route-stat"><div class="val">' + durStr + '</div><div class="lbl">Tiempo est.</div></div>' +
        '<div class="route-stat"><div class="val">' + sortedRoads.length + '</div><div class="lbl">Vías</div></div>' +
      '</div>' +
      (roadsHtml ? '<div class="route-roads"><div style="font-size:10px;font-weight:700;color:#1e40af;margin-bottom:4px;">VÍAS EN LA RUTA:</div>' + roadsHtml + '</div>' : '') +
      '<button class="route-btn active" onclick="clearRoute();updateRouteUI(null)">&#x2715; Ocultar ruta</button>' +
    '</div>';

    updateRouteUI(html);
  };
  if (_routeCache[cacheKey]) cb(null, _routeCache[cacheKey].raw || _routeCache[cacheKey]);
  else fetchRoute(center.lat, center.lng, coord.lat, coord.lng, cb);
}

function updateRouteUI(content) {
  var el = document.getElementById("route-container");
  if (!el) return;
  if (!content) { el.innerHTML = '<button class="route-btn" onclick="showRoute(_currentPanelData)">&#x1F6E3; Ver ruta desde casco urbano</button>'; return; }
  if (content === "loading") { el.innerHTML = '<div class="route-loading"><div class="loader" style="width:16px;height:16px;border-width:2px;"></div> Calculando ruta...</div>'; return; }
  el.innerHTML = content;
}

var _currentPanelData = null;

// ── POPUP ──
function getRouteInfo(d) {
  var coord = parseDMS(d.COORDENADAS);
  if (!coord) return null;
  var center = MUNI_CENTERS[(d.MUNICIPIO || "").toUpperCase()];
  if (!center) return null;
  var cacheKey = center.lat + "," + center.lng + "->" + coord.lat + "," + coord.lng;
  return _routeCache[cacheKey] || null;
}

function buildPopup(d) {
  var cfg = ESTADO_CONFIG[(d.ESTADO || "").toUpperCase()] || DEFAULT_ESTADO;
  var estado = d.ESTADO || "Sin estado";
  var route = getRouteInfo(d);
  var routeHtml = '';
  if (route) {
    var metros = Math.round(route.distance);
    var minutos = Math.round(route.duration / 60);
    routeHtml =
      '<div style="background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;padding:8px;margin:8px 0;display:flex;gap:10px;justify-content:space-around;">' +
        '<div style="text-align:center;"><div style="font-size:15px;font-weight:800;color:#1e40af;">' + metros.toLocaleString('es-CO') + ' m</div><div style="font-size:9px;color:#3b82f6;font-weight:700;text-transform:uppercase;">Distancia</div></div>' +
        '<div style="text-align:center;"><div style="font-size:15px;font-weight:800;color:#1e40af;">' + minutos + ' min</div><div style="font-size:9px;color:#3b82f6;font-weight:700;text-transform:uppercase;">Tiempo</div></div>' +
      '</div>';
  } else {
    routeHtml = '<div style="font-size:11px;color:#94a3b8;font-style:italic;margin:6px 0;">Calculando distancia...</div>';
  }
  return '<div style="min-width:240px;" data-popup-for="' + encodeURIComponent(d.ID_FICHA || "") + '">' +
    '<div class="popup-name">' + (d["NOMBRE BENEFICIARIO"] || "—") + '</div>' +
    '<div class="popup-loc">' + [d.VEREDA, d.MUNICIPIO].filter(Boolean).join(", ") + '</div>' +
    '<div style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap;">' +
      '<span class="estado-tag" style="background:' + cfg.bg + ';color:' + cfg.text + ';border:1px solid ' + cfg.border + ';font-size:11px;padding:3px 10px;">' + estado + '</span>' +
      (d.DIAGNOSTICO ? '<span class="diagnostico-tag ' + (d.DIAGNOSTICO === 'VIABLE' ? 'diag-viable' : 'diag-inviable') + '">' + d.DIAGNOSTICO + '</span>' : '') +
    '</div>' +
    routeHtml +
    '<button class="popup-btn" onclick="openPanel(\'' + encodeURIComponent(d.ID_FICHA || "") + '\')">Ver detalle completo &#x2192;</button>' +
  '</div>';
}

function updateMarkerPopup(d, route) {
  // Re-bind popup so cached distance/time shows next time it opens
  for (var i = 0; i < _markers.length; i++) {
    if (_markers[i]._benefData && _markers[i]._benefData.ID_FICHA === d.ID_FICHA) {
      _markers[i].setPopupContent(buildPopup(d));
      break;
    }
  }
}

// ── COLUMN ADMIN CONFIG ──
// Columns hidden by default everywhere (IDs, special fields handled elsewhere)
var HIDDEN_ALWAYS = ["ID_FICHA", "Proyecto_ID", "COORDENADAS", "ESTADO", "DIAGNOSTICO", "NOMBRE BENEFICIARIO"];
var ALL_COLUMNS = [];
var VISIBLE_COLUMNS = null; // null = show all detected columns

function loadColumnConfig() {
  try {
    var saved = localStorage.getItem("mapa_visible_cols_v1");
    if (saved) VISIBLE_COLUMNS = JSON.parse(saved);
  } catch(e) {}
}

function saveColumnConfig(cols) {
  VISIBLE_COLUMNS = cols;
  try { localStorage.setItem("mapa_visible_cols_v1", JSON.stringify(cols)); } catch(e) {}
}

function getDisplayColumns() {
  // Always show all detected columns minus hidden, unless user customized
  var defaults = ALL_COLUMNS.filter(function(c) { return HIDDEN_ALWAYS.indexOf(c) === -1; });
  if (!VISIBLE_COLUMNS) return defaults;
  // Only return ones still present in the sheet (handles renamed/removed cols)
  return VISIBLE_COLUMNS.filter(function(c) { return ALL_COLUMNS.indexOf(c) !== -1; });
}

function prettyLabel(col) {
  return col.replace(/_/g, " ").replace(/\s+/g, " ").trim();
}

function openAdminModal() {
  var visible = getDisplayColumns();
  var available = ALL_COLUMNS.filter(function(c) { return HIDDEN_ALWAYS.indexOf(c) === -1; });
  var list = document.getElementById("admin-cols-list");
  list.innerHTML = available.map(function(col, idx) {
    var checked = visible.indexOf(col) !== -1 ? "checked" : "";
    return '<label style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid #f1f5f9;cursor:pointer;font-size:13px;">' +
      '<input type="checkbox" class="admin-col-cb" data-col="' + col.replace(/"/g, "&quot;") + '" ' + checked + ' style="width:16px;height:16px;cursor:pointer;">' +
      '<span style="flex:1;">' + prettyLabel(col) + '</span>' +
      '<code style="font-size:10px;color:#94a3b8;background:#f8fafc;padding:2px 6px;border-radius:3px;">' + col + '</code>' +
    '</label>';
  }).join("");
  document.getElementById("admin-modal").style.display = "flex";
}

function closeAdminModal() { document.getElementById("admin-modal").style.display = "none"; }

function toggleAllColumns(state) {
  document.querySelectorAll(".admin-col-cb").forEach(function(cb) { cb.checked = state; });
}

function saveAdminConfig() {
  var checked = [];
  document.querySelectorAll(".admin-col-cb:checked").forEach(function(cb) { checked.push(cb.dataset.col); });
  saveColumnConfig(checked);
  closeAdminModal();
  if (_currentPanelData) openPanel(encodeURIComponent(_currentPanelData.ID_FICHA));
}

// ── SIDE PANEL ──
function openPanel(idFichaEnc) {
  var idFicha = decodeURIComponent(idFichaEnc);
  var d = ALL_DATA.filter(function(x) { return x.ID_FICHA === idFicha; })[0];
  if (!d) return;
  _currentPanelData = d;
  clearRoute();

  var cfg = ESTADO_CONFIG[(d.ESTADO || "").toUpperCase()] || DEFAULT_ESTADO;
  document.getElementById("sp-title").textContent = d["NOMBRE BENEFICIARIO"] || "—";
  document.getElementById("sp-subtitle").textContent = [d.VEREDA, d.MUNICIPIO].filter(Boolean).join(", ");
  var v = function(val) { return val || '<span class="empty">Sin datos</span>'; };
  var html = '';

  // Estado
  html += '<div class="sp-section"><div class="sp-section-title">Estado del Proyecto</div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">' +
      '<span class="estado-tag" style="background:'+cfg.bg+';color:'+cfg.text+';border:1px solid '+cfg.border+';">'+cfg.icon+' '+(d.ESTADO||"Sin estado")+'</span>' +
      (d.DIAGNOSTICO ? '<span class="diagnostico-tag '+(d.DIAGNOSTICO==='VIABLE'?'diag-viable':'diag-inviable')+'">'+d.DIAGNOSTICO+'</span>' : '') +
    '</div></div>';

  // Route container
  html += '<div class="sp-section" id="route-container">' +
    '<div class="route-loading"><div class="loader" style="width:16px;height:16px;border-width:2px;"></div> Calculando ruta...</div>' +
  '</div>';
  setTimeout(function(){ showRoute(d); }, 300);

  // Dynamic fields from admin config
  var displayCols = getDisplayColumns();
  if (displayCols.length) {
    html += '<div class="sp-section"><div class="sp-section-title">Detalles</div><div class="sp-grid">';
    displayCols.forEach(function(col) {
      var val = d[col];
      // Special handling for service-like columns
      if (col === "TIENE_AGUA" || col === "TIENE_ENERGIA" || col === "TIENE_ALCANTARILLADO") {
        // Render as badge inside a full field for consistency
      }
      html += '<div class="sp-field"><label>' + prettyLabel(col) + '</label><span>' + v(val) + '</span></div>';
    });
    html += '</div></div>';
  }

  var coord = parseDMS(d.COORDENADAS);
  if (coord) {
    html += '<div class="sp-section">' +
      '<div class="sp-field full"><label>Coordenadas</label><span style="font-family:monospace;font-size:12px;">' + (d.COORDENADAS || "—") + '</span></div>' +
      '<a href="https://www.google.com/maps?q='+coord.lat+','+coord.lng+'" target="_blank" '+
      'style="display:block;width:100%;padding:10px;background:var(--bg-primary);color:var(--accent);'+
      'border:1px solid var(--border);border-radius:8px;text-align:center;text-decoration:none;'+
      'font-size:12px;font-weight:700;margin-top:10px;">&#x1F5FA; Abrir en Google Maps</a></div>';
  }

  document.getElementById("sp-body").innerHTML = html;
  document.getElementById("side-panel").classList.add("open");
  setTimeout(function(){ _map.invalidateSize(); }, 350);
}

function closePanel() {
  clearRoute();
  document.getElementById("side-panel").classList.remove("open");
  setTimeout(function(){ _map.invalidateSize(); }, 350);
}

function clearMarkers() { _markers.forEach(function(m){ _map.removeLayer(m); }); _markers = []; }

function renderMarkers(data) {
  clearMarkers();
  var bounds = [];
  data.forEach(function(d) {
    var coord = parseDMS(d.COORDENADAS);
    if (!coord) return;
    var marker = L.marker([coord.lat, coord.lng], { icon: createMarkerIcon(d.ESTADO) }).addTo(_map);
    marker.bindPopup(buildPopup(d), {maxWidth:300});
    marker._benefData = d;
    bounds.push([coord.lat, coord.lng]);
    _markers.push(marker);
  });
  if (bounds.length) _map.fitBounds(bounds, {padding:[50,50], maxZoom:13});
  drawAllRoutes(data);
}

// Parse a date string from the sheet to a Date object
var SPANISH_MONTHS = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,sept:8,oct:9,nov:10,dic:11};
function parseSheetDate(s) {
  if (!s) return null;
  s = String(s).trim();
  if (!s) return null;
  // Spanish: 19-jun-2026 or 19 jun 2026 or 19/jun/2026
  var sp = s.toLowerCase().match(/^(\d{1,2})[\s\-\/]+([a-záéíóú]+)[\s\-\/]+(\d{2,4})/);
  if (sp) {
    var monKey = sp[2].slice(0,4).replace(/[áéíóú]/g, function(c){return {á:"a",é:"e",í:"i",ó:"o",ú:"u"}[c];});
    if (SPANISH_MONTHS[monKey] === undefined) monKey = sp[2].slice(0,3);
    var month = SPANISH_MONTHS[monKey];
    if (month !== undefined) {
      var y = +sp[3]; if (y < 100) y += 2000;
      return new Date(y, month, +sp[1]);
    }
  }
  // ISO: yyyy-mm-dd
  var iso = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
  if (iso) return new Date(+iso[1], +iso[2]-1, +iso[3]);
  // dd/mm/yyyy or mm/dd/yyyy
  var dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (dmy) {
    var a = +dmy[1], b = +dmy[2], y2 = +dmy[3];
    if (y2 < 100) y2 += 2000;
    var day, mo;
    if (a > 12) { day = a; mo = b; }
    else if (b > 12) { mo = a; day = b; }
    else { day = a; mo = b; }
    return new Date(y2, mo-1, day);
  }
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function clearDateFilter() {
  document.getElementById("date-from").value = "";
  document.getElementById("date-to").value = "";
  applyFilters();
}

function applyFilters() {
  var proyecto = document.getElementById("sel-proyecto").value;
  var municipio = document.getElementById("sel-municipio").value;
  var estado = document.getElementById("sel-estado").value;
  var diagnostico = document.getElementById("sel-diagnostico").value;
  var search = (document.getElementById("search-input").value||"").toLowerCase();
  var fromStr = document.getElementById("date-from").value;
  var toStr = document.getElementById("date-to").value;
  var fromDate = fromStr ? new Date(fromStr+"T00:00:00") : null;
  var toDate = toStr ? new Date(toStr+"T23:59:59") : null;

  _filtered = ALL_DATA.filter(function(d) {
    if (proyecto && d.Proyecto_ID !== proyecto) return false;
    if (municipio && d.MUNICIPIO !== municipio) return false;
    if (estado && (d.ESTADO||"").toUpperCase() !== estado.toUpperCase()) return false;
    if (diagnostico && (d.DIAGNOSTICO||"").toUpperCase() !== diagnostico.toUpperCase()) return false;
    if (fromDate || toDate) {
      var visita = parseSheetDate(d["FECHA VISITA INICIAL"] || d["FECHA_VISITA_INICIAL"] || d.FECHA);
      if (!visita) return false;
      if (fromDate && visita < fromDate) return false;
      if (toDate && visita > toDate) return false;
    }
    if (search) { var hay = [d["NOMBRE BENEFICIARIO"],d.VEREDA,d.MUNICIPIO,d.ID_FICHA,d.CORREGIMIENTO,d.IDENTIFICACION_BENEF,d["PUNTO DE REFERENCIA"]].join(" ").toLowerCase(); if (hay.indexOf(search)===-1) return false; }
    return true;
  });
  renderMarkers(_filtered);
  updateStats(_filtered);
}

function populateFilters(data) {
  var proyectos={},municipios={},estados={};
  data.forEach(function(d){
    if(d.Proyecto_ID)proyectos[d.Proyecto_ID]=(proyectos[d.Proyecto_ID]||0)+1;
    if(d.MUNICIPIO)municipios[d.MUNICIPIO]=(municipios[d.MUNICIPIO]||0)+1;
    if(d.ESTADO)estados[(d.ESTADO||"").toUpperCase()]=(estados[(d.ESTADO||"").toUpperCase()]||0)+1;
  });
  var selProy=document.getElementById("sel-proyecto"); selProy.innerHTML='<option value="">Todos los proyectos</option>';
  Object.keys(proyectos).sort().forEach(function(p){ var o=document.createElement("option");o.value=p;o.textContent=(PROYECTO_LABELS[p]||p)+" ("+proyectos[p]+")";selProy.appendChild(o); });
  var selMun=document.getElementById("sel-municipio"); selMun.innerHTML='<option value="">Todos los municipios</option>';
  Object.keys(municipios).sort().forEach(function(m){ var o=document.createElement("option");o.value=m;o.textContent=m+" ("+municipios[m]+")";selMun.appendChild(o); });
  var selEst=document.getElementById("sel-estado"); selEst.innerHTML='<option value="">Todos los estados</option>';
  Object.keys(estados).sort().forEach(function(e){ var o=document.createElement("option");o.value=e;o.textContent=e+" ("+estados[e]+")";selEst.appendChild(o); });
  var legend=document.getElementById("estado-legend"); legend.innerHTML="";
  Object.keys(ESTADO_CONFIG).forEach(function(key){
    if(key==="EN EJECUCION")return;
    var cfg=ESTADO_CONFIG[key]; var item=document.createElement("div"); item.className="legend-item";
    item.innerHTML='<div class="legend-dot" style="background:'+cfg.color+';"></div>'+key;
    item.onclick=function(){ document.getElementById("sel-estado").value=item.classList.contains("active-legend")?"":key;
      document.querySelectorAll(".legend-item").forEach(function(el){el.classList.remove("active-legend");});
      if(document.getElementById("sel-estado").value)item.classList.add("active-legend"); applyFilters(); };
    legend.appendChild(item);
  });
}

function updateStats(data) {
  document.getElementById("st-total").textContent=data.length;
  var viables=data.filter(function(d){return(d.DIAGNOSTICO||"").toUpperCase()==="VIABLE";}).length;
  var inviables=data.filter(function(d){return(d.DIAGNOSTICO||"").toUpperCase()==="INVIABLE";}).length;
  var municipios={}; data.forEach(function(d){if(d.MUNICIPIO)municipios[d.MUNICIPIO]=true;});
  document.getElementById("st-viables").textContent=viables;
  document.getElementById("st-inviables").textContent=inviables;
  document.getElementById("st-municipios").textContent=Object.keys(municipios).length;
}

function loadData() {
  document.getElementById("loading").classList.remove("hidden");
  fetch(SHEET_URL).then(function(r){return r.text();}).then(function(csv){
    var parsed = parseCSV(csv);
    ALL_DATA = parsed.filter(function(d){ return d.COORDENADAS && d.COORDENADAS.trim(); });
    ALL_COLUMNS = parsed.length ? Object.keys(parsed[0]) : (ALL_DATA[0] ? Object.keys(ALL_DATA[0]) : []);
    PROYECTO_LABELS = {};
    ALL_DATA.forEach(function(d){ if(d.Proyecto_ID && d.CTTO && !PROYECTO_LABELS[d.Proyecto_ID]) PROYECTO_LABELS[d.Proyecto_ID]=d.CTTO; });
    populateFilters(ALL_DATA); _filtered=ALL_DATA; renderMarkers(ALL_DATA); updateStats(ALL_DATA);
    document.getElementById("loading").classList.add("hidden");
  }).catch(function(err){
    console.error("Error cargando datos:",err);
    document.getElementById("loading").querySelector(".loading-text").textContent="Error al cargar datos. Verifica que el Sheet sea público.";
  });
}

function reloadData() { closePanel(); loadData(); }

function initMap() {
  _map = L.map("map", { center:[6.8,-75.5], zoom:8, zoomControl:true });
  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
    attribution:'&copy; <a href="https://carto.com/">CARTO</a> &middot; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
    maxZoom:19, subdomains:"abcd"
  }).addTo(_map);
}

loadColumnConfig();
initMap();
loadData();
setInterval(function(){ loadData(); }, 5*60*1000);
</script>
